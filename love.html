<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волшебный лес сакуры</title>

    <link rel="stylesheet" href="sakura.css">
</head>

<body>

<!-- Звёзды -->
<div id="stars"></div>

<!-- Луна -->
<div class="moon"></div>

<!-- Дерево -->

<div id="petals"></div>

<!-- Светлячки -->
<div id="fireflies"></div>

<!-- Туман -->
<div id="fog"></div>
<div id="fog2"></div>

<!-- Заголовок -->
<div class="message">
    <h1>Спасибо, что ты здесь ❤️</h1>
    <p>Добро пожаловать в волшебный лес сакуры</p>
</div>

<!-- Музыка -->
<audio id="bgMusic" loop>
    <source src="assets/marafety.mp3" type="audio/mpeg">
</audio>

<script src="sakura.js"></script>
<script src="script.js"></script>

</html>
